<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Матрикс" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#1e40af" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1e3a8a" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" href="pwa-icon.svg" />
    <meta
      name="description"
      content="Пульт фермы Нерал-Матрикс: дойка, стадо, кормление, задачи. Установите на экран телефона."
    />
    <meta name="color-scheme" content="light" />
    <title>Нерал-Матрикс — пульт фермы (операции)</title>
  </head>
  <body>
    <script>
      (function () {
        var p = sessionStorage.getItem('matrix-spa-path')
        if (!p) return
        sessionStorage.removeItem('matrix-spa-path')
        var base = location.pathname.replace(/\/?index\.html$/, '').replace(/\/$/, '')
        history.replaceState(null, '', base + p)
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
