# Бесплатный URL: https://<user>.github.io/<repo>/
# Требуется: репозиторий Public (на бесплатном GitHub Pages не работает с Private).
# Settings → Pages → Source: GitHub Actions.

name: Deploy GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build (group dashboard)
        working-directory: web
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run build

      - name: Install and build (Matrix farm console)
        working-directory: web-matrix
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/matrix/
        run: |
          npm ci
          npm run build

      - name: Merge Matrix app into Pages artifact
        run: |
          mkdir -p web/dist/matrix
          cp -r web-matrix/dist/. web/dist/matrix/
          cp web-matrix/dist/index.html web/dist/matrix/404.html

      - name: Verify index.html uses repository base for assets
        run: |
          test -f web/dist/index.html
          grep -qF "/${{ github.event.repository.name }}/assets/" web/dist/index.html
          test -f web/dist/matrix/index.html
          grep -qF "/${{ github.event.repository.name }}/matrix/assets/" web/dist/matrix/index.html

      - name: SPA fallback (GitHub Pages 404 — группа + /matrix/)
        run: node scripts/github-pages-404.mjs "${{ github.event.repository.name }}" web/dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
